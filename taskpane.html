<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Email Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <script src="taskpane.js" type="text/javascript"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      background: #ffffff;
      color: #201f1e;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #0f6cbd;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #605e5c;
      margin-bottom: 4px;
      margin-top: 12px;
    }

    select, input[type="text"], textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #8a8886;
      border-radius: 2px;
      font-family: "Segoe UI", sans-serif;
      font-size: 13px;
      color: #201f1e;
      background: #fff;
    }

    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: #0f6cbd;
      box-shadow: 0 0 0 1px #0f6cbd;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
      line-height: 1.5;
    }

    .btn-primary {
      width: 100%;
      margin-top: 14px;
      padding: 8px;
      background: #0f6cbd;
      color: #fff;
      border: none;
      border-radius: 2px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary:hover { background: #115ea3; }
    .btn-primary:disabled { background: #c8c6c4; cursor: not-allowed; }

    .btn-secondary {
      flex: 1;
      padding: 6px 4px;
      background: #fff;
      border: 1px solid #8a8886;
      border-radius: 2px;
      font-size: 11px;
      cursor: pointer;
      color: #201f1e;
    }

    .btn-secondary:hover { background: #f3f2f1; }

    .result-section { margin-top: 16px; display: none; }

    .result-label {
      font-size: 11px;
      font-weight: 600;
      color: #605e5c;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .result-box {
      width: 100%;
      padding: 8px;
      background: #f3f2f1;
      border: 1px solid #e1dfdd;
      border-radius: 2px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      color: #201f1e;
      margin-bottom: 8px;
      min-height: 32px;
    }

    .insert-btn {
      width: 100%;
      padding: 8px;
      background: #107c10;
      color: #fff;
      border: none;
      border-radius: 2px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .insert-btn:hover { background: #0b6a0b; }

    .refine-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #605e5c;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #e1dfdd;
      border-top-color: #0f6cbd;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fde7e9;
      border: 1px solid #d13438;
      color: #a4262c;
      padding: 8px;
      border-radius: 2px;
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }

    .divider {
      border: none;
      border-top: 1px solid #e1dfdd;
      margin: 14px 0;
    }
  </style>
</head>
<body>
  <h1>✦ AI Email Assistant</h1>

  <label for="tone">Tone</label>
  <select id="tone">
    <option value="professional">Professional</option>
    <option value="friendly">Friendly</option>
    <option value="formal">Formal</option>
    <option value="concise">Concise</option>
    <option value="assertive">Assertive</option>
  </select>

  <label for="emailType">Email type</label>
  <select id="emailType">
    <option value="general">General</option>
    <option value="follow-up">Follow-up</option>
    <option value="request">Request</option>
    <option value="status update">Status update</option>
    <option value="meeting invite">Meeting invite</option>
    <option value="apology">Apology</option>
    <option value="introduction">Introduction</option>
  </select>

  <label for="recipient">Recipient name / role <span style="font-weight:400">(optional)</span></label>
  <input type="text" id="recipient" placeholder="e.g. John, my manager, the team..." />

  <label for="brief">What do you want to say? *</label>
  <textarea id="brief" placeholder="e.g. Let the team know the deadline moved to Friday and apologise for the late notice..."></textarea>

  <button class="btn-primary" id="generateBtn" onclick="generateEmail()">Write my email</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Writing your email...</div>
  </div>

  <div class="error" id="errorMsg"></div>

  <div class="result-section" id="resultSection">
    <hr class="divider" />

    <div class="result-label">Subject</div>
    <div class="result-box" id="subjectOut"></div>

    <div class="result-label">Body</div>
    <div class="result-box" id="bodyOut"></div>

    <button class="insert-btn" onclick="insertIntoEmail()">✓ Insert into email</button>

    <div class="result-label" style="margin-top:8px;">Refine</div>
    <div class="refine-row">
      <button class="btn-secondary" onclick="refine('shorter')">Shorter</button>
      <button class="btn-secondary" onclick="refine('longer')">Longer</button>
      <button class="btn-secondary" onclick="refine('more formal')">More formal</button>
      <button class="btn-secondary" onclick="refine('more friendly')">More friendly</button>
    </div>
  </div>
</body>
</html>
